<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Registrazione</title>

    <script>
 
function login() {

    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    fetch(`http://localhost:8080/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
        method: "GET"
    })
    .then(res => {

        console.log("Status HTTP:", res.status);

        return res.text().then(text => {

            console.log("Risposta backend:", text);

            if (!res.ok) {
                throw new Error("Errore login");
            }

            return text;
        });
    })
.then(token => {

    console.log("Token ricevuto:", token);

    localStorage.setItem("token", token);

    const ruolo = getRoleFromToken(token);

    console.log("Ruolo:", ruolo);


    if(ruolo === "ADMIN") {

        window.location.href = "pagina_risposta.html";

    } else if(ruolo === "USER") {

        window.location.href = "pagina_risposta2.html";

    } else {

        alert("Ruolo non riconosciuto");

    }

})
    .catch(err => {

        console.error("Errore:", err);

        alert("Login fallito: credenziali errate");
    });

}

    function getRoleFromToken(token) {

        const payload = token.split(".")[1];

        const decodedPayload = JSON.parse(
            atob(payload)
        );

        return decodedPayload.role;
    }

    </script>
</head>
<body>

    <h1>Pagina di Login</h1>

    <label>Username:</label>
    <input type="text" id="loginUsername">

    <label>Password:</label>
    <input type="password" id="loginPassword">
    
    <input type="button" value="Login" onclick="login()">

</body>
</html>
